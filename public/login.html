<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splendid StarLink - WiFi Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            padding: 40px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .logo-text {
            font-size: 20px;
            color: #667eea;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .info-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #555;
        }

        .info-box .label {
            font-weight: 600;
            color: #333;
            display: block;
            margin-bottom: 4px;
        }

        .router-info {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #2e7d32;
        }

        .router-info .label {
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
        }

        .login-form {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .status-message {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
        }

        .error-message {
            background: #ffebee;
            border-left: 4px solid #f44336;
            color: #c62828;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 12px;
            display: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .footer {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            🛰️ <span class="logo-text">Splendid StarLink</span>
        </div>
        <div class="subtitle">WiFi Access Portal</div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <div class="status-message">Redirecting to Splendid StarLink...</div>
        </div>

        <div id="info">
            <div id="routerInfo" class="router-info" style="display:none;">
                <span class="label">🛰️ Connected to:</span>
                <span id="routerName"></span>
            </div>

            <div id="macInfo" class="info-box" style="display:none;">
                <span class="label">📱 Device MAC:</span>
                <span id="macValue" style="font-family: monospace; word-break: break-all;"></span>
            </div>

            <button onclick="proceedWithSilentLogin()">Proceed to Splendid StarLink</button>
        </div>

        <div class="footer">
            <p>Capturing WiFi information...</p>
        </div>
    </div>

    <script>
        // Capture MikroTik hotspot variables
        var mac = "$(mac-esc)";
        var clientIp = "$(src-address)";
        var routerId = "$(identity)";
        var linkLogin = "$(link-login-only)";
        var linkOrig = "$(link-orig)";

        console.log('📡 MikroTik Hotspot Capture:', {
            mac,
            clientIp,
            routerId,
            linkLogin,
            linkOrig
        });

        // Function to build redirect URL
        function buildRedirectUrl() {
            const baseUrl = 'https://splendidstarlink.netlify.app';
            const params = new URLSearchParams({
                mac: mac || '',
                ip: clientIp || '',
                router_id: routerId || '',
                link_login: linkLogin || '',
                link_orig: linkOrig || ''
            });
            return `${baseUrl}?${params.toString()}`;
        }

        // Function to proceed with silent login
        function proceedWithSilentLogin() {
            try {
                // Store WiFi info in localStorage for later use
                // This includes the link_login and link_orig URLs that will be needed after payment
                localStorage.setItem('wifiLinkLogin', linkLogin || '');
                localStorage.setItem('wifiLinkOrig', linkOrig || '');
                localStorage.setItem('wifiMac', mac || '');
                localStorage.setItem('wifiUserIp', clientIp || '');
                localStorage.setItem('wifiRouter', routerId || '');

                console.log('✅ WiFi session data stored in localStorage');
                console.log('🔗 Redirecting to:', buildRedirectUrl());

                // Redirect to frontend to check MAC status
                window.location.href = buildRedirectUrl();
            } catch (error) {
                console.error('❌ Error storing WiFi info:', error);
                alert('Error accessing WiFi portal. Please refresh the page.');
            }
        }

        // On page load, display captured info
        window.addEventListener('DOMContentLoaded', function () {
            console.log('✅ Login portal loaded');

            // Hide loading, show info
            document.getElementById('loading').style.display = 'none';
            document.getElementById('info').style.display = 'block';

            // Display router info if available
            if (routerId && routerId !== '$(identity)') {
                document.getElementById('routerInfo').style.display = 'block';
                document.getElementById('routerName').textContent = routerId;
            }

            // Display MAC info if available
            if (mac && mac !== '$(mac-esc)') {
                document.getElementById('macInfo').style.display = 'block';
                document.getElementById('macValue').textContent = mac;
            }

            // Log captured variables for debugging
            console.log('📱 Captured Variables:', {
                mac: mac !== '$(mac-esc)' ? mac : 'NOT CAPTURED',
                ip: clientIp !== '$(src-address)' ? clientIp : 'NOT CAPTURED',
                router: routerId !== '$(identity)' ? routerId : 'NOT CAPTURED',
                linkLogin: linkLogin !== '$(link-login-only)' ? 'AVAILABLE' : 'NOT CAPTURED',
                linkOrig: linkOrig !== '$(link-orig)' ? 'AVAILABLE' : 'NOT CAPTURED'
            });
        });

        // Auto-proceed if all variables captured (optional)
        // Uncomment to auto-redirect without user click
        // setTimeout(function() {
        //     if (mac !== '$(mac-esc)' && linkLogin !== '$(link-login-only)') {
        //         proceedWithSilentLogin();
        //     }
        // }, 2000);
    </script>
</body>
</html>
